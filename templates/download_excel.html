<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Remote Log by Date</title>
    <!-- Include flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('https://media.glassdoor.com/l/0a/75/c1/a7/college.jpg?signature=002bb839dfd132886a71377684599b3968b40441e7eebdbdba28184f694df758');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .copyright {
        position: fixed;
        bottom: 0;
        width: 100%;
        padding: 10px 0;
        text-align: center;
        color: #fff;
        background-color: rgba(45, 11, 199, 0.7);
        font-size: 14px;
        font-weight: normal;
        letter-spacing: 1px;
    }

    .copyright a {
        color: #fff;
        text-decoration: none;
        font-weight: bold;
        transition: color 0.3s ease;
    }

    .copyright a:hover {
        color: #3498db;
    }


        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .link {
            margin-top: 20px;
            color: #2980b9;
            text-decoration: none;
            font-weight: bold;
        }

        .link:hover {
            text-decoration: underline;
        }
        .copyright {
        position: fixed;
        bottom: 0;
        width: 100%;
        padding: 10px 0;
        text-align: center;
        color: #fff;
        background-color: rgba(33, 21, 211, 0.7);
        font-size: 14px;
        font-weight: normal;
        letter-spacing: 1px;
    }

    .copyright a {
        color: #fff;
        text-decoration: none;
        font-weight: bold;
        transition: color 0.3s ease;
    }

    .copyright a:hover {
        color: #3498db;
    }

    .divider {
        margin-bottom: 10px;
    }
        h1 {
            margin-bottom: 20px;
            color: #2980b9;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            color: #2980b9;
            font-weight: bold;
        }

        input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        button {
            padding: 10px;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        button:hover {
            background-color: #3498db;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Download Remote Log</h1>
        <form method="POST" action="{{ url_for('download_excel') }}">
            <label for="start_datetime">Start Date and Time:</label>
            <input type="text" id="start_datetime" name="start_datetime" required>
            <br>
            <label for="end_datetime">End Date and Time:</label>
            <input type="text" id="end_datetime" name="end_datetime" required>
            <br>
            <button type="submit">Download Data</button>
        </form>
        <a class="link" href="/">Back to Home</a>
    </div>
     <!-- Copyright Information -->
     <div class="copyright">
        <div class="divider"></div>
        <p>Developed by SCOPE Team</p>
 <!--<p>For inquiries, contact us at <a href="mailto:contact@scopelab.com">contact@scopelab.com</a></p>-->    </div>
    <!-- Include flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        // Initialize flatpickr for the date-time inputs
        flatpickr("#start_datetime", {
            enableTime: true,
            dateFormat: "d-m-Y H:i",
        });
        flatpickr("#end_datetime", {
            enableTime: true,
            dateFormat: "d-m-Y H:i",
            
        });
    </script>
</body>
</html>
